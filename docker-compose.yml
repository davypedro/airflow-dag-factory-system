# ============================================================
#  Docker Compose — Airflow ETL
# ============================================================
#  Serviços:
#    postgres     — banco de metadados do Airflow
#    redis        — broker para CeleryExecutor (descomente se precisar)
#    airflow-init — inicializa o banco e cria o usuário admin
#    webserver    — UI do Airflow (porta 8080)
#    scheduler    — agendador de DAGs
#    worker       — executa tarefas (opcional, para CeleryExecutor)
#
#  Início rápido:
#    cp .env.example .env
#    docker compose up airflow-init
#    docker compose up -d
#
#  A UI fica disponível em: http://localhost:8080
#  Usuário padrão: admin / admin (altere em .env antes de produção)
# ============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: airflow-etl:latest
  env_file: .env
  environment: &airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # Expõe plugins e includes ao Python
    PYTHONPATH: /opt/airflow/plugins:/opt/airflow/include
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./include:/opt/airflow/include
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped
  networks:
    - airflow-net

services:
  # ── Banco de metadados do Airflow ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./include/sql/init_dwh.sql:/docker-entrypoint-initdb.d/init_dwh.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    networks:
      - airflow-net
    restart: unless-stopped

  # ── Redis (necessário apenas para CeleryExecutor) ────────────────────────
  # redis:
  #   image: redis:7-alpine
  #   container_name: airflow-redis
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - airflow-net
  #   restart: unless-stopped

  # ── Inicialização (roda uma vez e encerra) ────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER}" \
          --password "${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "${AIRFLOW_ADMIN_EMAIL}" || true
        echo "Inicialização concluída."
    restart: "no"

  # ── Webserver (UI) ────────────────────────────────────────────────────────
  webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Scheduler ─────────────────────────────────────────────────────────────
  scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test:
        - CMD-SHELL
        - >
          airflow jobs check
          --job-type SchedulerJob
          --hostname "$${HOSTNAME}"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Worker (descomente para usar CeleryExecutor) ──────────────────────────
  # worker:
  #   <<: *airflow-common
  #   container_name: airflow-worker
  #   command: celery worker
  #   depends_on:
  #     - scheduler
  #     - redis

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:

# ── Redes ─────────────────────────────────────────────────────────────────────
networks:
  airflow-net:
    driver: bridge
